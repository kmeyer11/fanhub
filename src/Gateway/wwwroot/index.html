<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FanHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════ AUTH SCREEN ═══════════════ -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-wordmark">Fan<span>Hub</span></div>
        <div class="auth-logo-sub">Your personal football companion</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login-btn">Sign in</button>
        <button class="auth-tab" id="tab-register-btn">Create account</button>
      </div>

      <!-- Login -->
      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" id="login-password" type="password" placeholder="••••••••" required />
        </div>
        <button class="btn btn-primary" id="login-btn" type="submit">Sign in</button>
        <div class="auth-error" id="login-error"></div>
      </form>

      <!-- Register -->
      <form id="register-form" hidden autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input class="form-input" id="reg-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" id="reg-password" type="password" placeholder="Min. 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label">Favourite team</label>
          <div id="team-picker-grid" class="team-select-grid">
            <div class="team-picker-loading">Loading teams…</div>
          </div>
        </div>
        <button class="btn btn-primary" id="register-btn" type="submit">Create account</button>
        <div class="auth-error" id="register-error"></div>
      </form>
    </div>
  </div>

  <!-- ═══════════════ APP SCREEN ═══════════════ -->
  <div id="app-screen" hidden>

    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-brand">
        <img id="nav-badge" src="" alt="" />
        Fan<span class="nav-brand-accent">Hub</span>
      </div>
      <div class="nav-team" id="nav-team"></div>
      <div class="nav-actions">
        <button class="notif-btn" id="notif-btn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" id="notif-count" hidden></span>
        </button>
        <span class="nav-user" id="nav-user"></span>
        <button class="btn-sm" id="logout-btn">Logout</button>
      </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-glow"></div>
      <img class="hero-badge" id="hero-badge" src="" alt="" />
      <div class="hero-info">
        <h1 class="hero-name" id="hero-name"></h1>
        <div class="hero-meta">
          <span class="hero-meta-item" id="hero-league-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            <span id="hero-league"></span>
          </span>
          <span class="hero-meta-item" id="hero-stadium-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span id="hero-stadium"></span>
          </span>
          <span class="hero-meta-item" id="hero-founded-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="hero-founded"></span>
          </span>
        </div>
      </div>
    </div>

    <!-- Tab nav -->
    <div class="tabs-nav">
      <button class="tab-btn active" data-tab="fixtures">Upcoming</button>
      <button class="tab-btn" data-tab="results">Results</button>
      <button class="tab-btn" data-tab="squad">Squad</button>
      <button class="tab-btn" data-tab="standings">Table</button>
      <button class="tab-btn" data-tab="notifications">Notifications</button>
    </div>

    <!-- Content panels -->
    <div class="content">
      <div id="panel-fixtures"    class="tab-panel active"></div>
      <div id="panel-results"     class="tab-panel"></div>
      <div id="panel-squad"       class="tab-panel"></div>
      <div id="panel-standings"   class="tab-panel"></div>
      <div id="panel-notifications" class="tab-panel"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
